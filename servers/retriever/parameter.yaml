# servers/retriever/parameter.yaml
# Phase 1: corpus embeddings via custom_app/services/google_embedder.py;
#          FAISS index / search via UltraRAG retriever.

# model_name_or_path: used when backend runs embed/search (see examples/parameter overrides).
model_name_or_path: gemini-embedding-001
backend: openai
backend_configs:
  sentence_transformers:
    trust_remote_code: true
    sentence_transformers_encode:
      normalize_embeddings: true
      encode_chunk_size: 256
  openai:
    model_name: gemini-embedding-001
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
    api_key: "from_env"
    concurrency: 4
  bm25:
    lang: en
    save_path: index/bm25

# Phase 5.1.2: custom_app RagRunner 向量后端切换
# faiss = 本地 FAISS 索引文件（Phase 3 / 4 默认）
# qdrant = 局域网 Qdrant 服务（连接信息见 .env 中 ULTRARAG_QDRANT_*）
# 若此字段为空，自动 fallback 到 ULTRARAG_VECTOR_BACKEND 环境变量；仍为空则默认 faiss
vector_backend: faiss

index_backend: faiss
index_backend_configs:
  faiss:
    index_use_gpu: false
    index_chunk_size: 10000
    index_path: data/kb/agv_demo/index/index.index
  milvus:
    uri: index/milvus_demo.db
    token: null
    id_field_name: id
    vector_field_name: vector
    text_field_name: contents
    id_max_length: 64
    text_max_length: 60000
    metric_type: IP
    index_params:
      index_type: AUTOINDEX
      metric_type: IP
    search_params:
      metric_type: IP
      params: {}
    index_chunk_size: 1000

corpus_path: data/kb/agv_demo/corpora/chunks.jsonl
embedding_path: data/kb/agv_demo/embedding/embedding.npy
collection_name: agv_demo

websearch_backend: tavily
websearch_backend_configs:
  tavily:
    api_key: ""
    retries: 3
    base_delay: 1.0
    search_kwargs: {}

batch_size: 16
top_k: 8
# RAG 问答：先多召回，final_top_k=0 表示不把命中截断（全部送入生成，适合完整 SOP）
recall_top_k: 20
final_top_k: 0

# custom_app RagRunner 本地 Reranker（Phase 4.0 起统一到 LocalReranker）
# 模型加载：custom_app/utils/local_reranker.py（依赖 torch + transformers，已在 .venv 中）
# 模型路径：默认指向本地下载的 bge-reranker-v2-m3；模型迁移到其他服务器只需改这一行。
# 排障/纯测延迟可设 ULTRARAG_DISABLE_RERANK=1。
rag_rerank:
  enabled: true
  model_name_or_path: C:\reranker\bge-reranker-v2-m3
  device: auto    # auto / cuda / cpu；CUDA 加载失败自动 fallback CPU
  batch_size: 4   # bge-reranker-v2-m3 在 RTX 2080 8GB 上建议 2~4
