<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AGV 知识库助手 · 登录</title>
    <link rel="icon" href="/frontend/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/frontend/style.css">
  </head>
  <body>
    <main class="login-shell" data-page="login">
      <section class="login-card">
        <h1>AGV 知识库助手</h1>
        <p>当前为内网模式，无需登录。直接访问系统即可使用。</p>
        <a class="admin-primary-link" href="/">进入对话页</a>

        <form class="hidden" aria-hidden="true">
          <label>
            用户名
            <input type="text" name="username" autocomplete="username">
          </label>
          <label>
            密码
            <input type="password" name="password" autocomplete="current-password">
          </label>
          <button type="submit">登录</button>
        </form>
      </section>
    </main>
  </body>
</html>
